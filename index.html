<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartZone | مكتبة الألعاب الذكية الموحدة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800;900&family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #08090b;
            --bg-panel: rgba(20, 22, 26, 0.85);
            --bg-card-hover: #1e2126;
            --border-color: rgba(255, 255, 255, 0.08);
            --burgundy-main: #800020;
            --burgundy-light: #b30e38;
            --burgundy-glow: rgba(179, 14, 56, 0.4);
            --text-light: #f0f2f5;
            --text-muted: #8b919e;
            --vip-gold: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية الصفحة */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 30%, #17050a 0%, #08090b 70%);
        }

        .bg-grid {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(179, 14, 56, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(179, 14, 56, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(600px) rotateX(60deg);
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: perspective(600px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(600px) rotateX(60deg) translateY(50px); }
        }

        /* الحاوية الرئيسية */
        .platform-wrapper {
            display: flex;
            width: 100%;
            max-width: 1350px;
            background-color: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(179, 14, 56, 0.25);
            box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 30px var(--burgundy-glow);
            z-index: 1;
        }

        /* القائمة الجانبية (الشاشات الكبيرة) */
        .sidebar {
            width: 270px;
            background-color: rgba(10, 11, 14, 0.95);
            padding: 35px 20px;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 30%, var(--burgundy-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px var(--burgundy-glow);
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-section-title {
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            padding-right: 5px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-light);
            font-size: 14px;
            font-weight: 700;
            padding: 12px 16px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.25s ease;
        }

        .nav-link:hover {
            background-color: rgba(179, 14, 56, 0.15);
            color: #fff;
        }

        .nav-link.active {
            background: linear-gradient(90deg, rgba(179, 14, 56, 0.25), transparent);
            border-right: 4px solid var(--burgundy-light);
            color: #fff;
        }

        .badge-soon {
            font-size: 10px;
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .content-header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-header h1 {
            font-size: 28px;
            font-weight: 800;
        }

        .menu-toggle {
            display: none;
            background: rgba(179, 14, 56, 0.25);
            border: 1px solid var(--burgundy-light);
            color: #fff;
            font-size: 22px;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* الكروت */
        .games-library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 25px;
        }

        .game-card-v {
            background-color: rgba(15, 16, 20, 0.8);
            border-radius: 14px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-light);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
        }

        .game-cover-wrapper {
            width: 100%;
            padding-top: 140%;
            position: relative;
            background-color: #15171c;
        }

        .game-cover-wrapper img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        .game-details { padding: 16px; }
        .game-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
        .game-genre { font-size: 12px; color: var(--text-muted); }

        .card-badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 800;
            position: absolute;
            top: 10px; left: 10px;
            z-index: 2;
        }
        .badge-free { background: #10b981; color: black; }
        .badge-vip { background: var(--vip-gold); color: black; }

        .footer {
            margin-top: auto;
            padding-top: 30px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }

        /* خلفية سوداء للموبايل عند فتح القائمة */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9998;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* ================= تعديلات الموبايل القاطعة ================= */
        @media (max-width: 850px) {
            body { padding: 0; }

            .platform-wrapper {
                border-radius: 0;
                border: none;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }

            .menu-toggle { display: block; }

            /* إخفاء القائمة تماماً بالـ display والـ opacity في الموبايل */
            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                width: 280px;
                height: 100vh;
                background-color: #0b0c0f !important;
                z-index: 99999;
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
                transform: translateX(100%);
                transition: transform 0.3s ease, opacity 0.3s ease, visibility 0.3s ease;
            }

            /* إظهار القائمة فقط عند إضافة كلاس active */
            .sidebar.active {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
                transform: translateX(0);
            }

            .main-content { padding: 20px 15px; }

            .games-library-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="bg-grid"></div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMenu()"></div>

    <div class="platform-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="brand-logo">SMARTZONE</div>
            
            <nav class="nav-group">
                <span class="nav-section-title">القائمة الرئيسية</span>
                <a href="index.html" class="nav-link active"><span>📖 المكتبة</span></a>
                <a href="#" class="nav-link"><span>🛒 المتجر</span><span class="badge-soon">قريباً...</span></a>
                <a href="#" class="nav-link"><span>👥 المجتمع</span><span class="badge-soon">قريباً...</span></a>
            </nav>

            <nav class="nav-group">
                <span class="nav-section-title">ألعابي</span>
                <a href="#" class="nav-link"><span>⚪ مثبتة</span></a>
                <a href="#" class="nav-link"><span>⭐ المفضلة</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>مكتبة الألعاب</h1>
                <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            </header>

            <div class="games-library-grid">
                <a href="salfa.html" class="game-card-v">
                    <span class="card-badge badge-free">مجاني</span>
                    <div class="game-cover-wrapper"><img src="salfa-cover.jpg" alt="برا السالفة"></div>
                    <div class="game-details">
                        <div class="game-title">لعبة برا السالفة</div>
                        <div class="game-genre">فكاهة | شات</div>
                    </div>
                </a>

                <a href="quiz.html" class="game-card-v">
                    <span class="card-badge badge-free">مجاني</span>
                    <div class="game-cover-wrapper"><img src="quiz-cover.jpg" alt="QuizZone"></div>
                    <div class="game-details">
                        <div class="game-title">تحدي الأسئلة والسرعة</div>
                        <div class="game-genre">ذكاء | جماعية</div>
                    </div>
                </a>

                <a href="rsm.html" class="game-card-v">
                    <span class="card-badge badge-vip">👑 VIP</span>
                    <div class="game-cover-wrapper"><img src="rsm-cover.jpg" alt="خمن الرسمة"></div>
                    <div class="game-details">
                        <div class="game-title">لعبة خمن الرسمة</div>
                        <div class="game-genre">إبداع | جماعية</div>
                    </div>
                </a>

                <a href="mafia.html" class="game-card-v">
                    <span class="card-badge badge-vip">👑 VIP</span>
                    <div class="game-cover-wrapper"><img src="mafia-cover.jpg" alt="SmartMafia"></div>
                    <div class="game-details">
                        <div class="game-title">لعبة مافيا</div>
                        <div class="game-genre">استراتيجية | غموض</div>
                    </div>
                </a>
            </div>

            <footer class="footer">
                منصة SmartZone | تطوير: مؤمن يوسف
            </footer>
        </main>
    </div>

    <script>
        function toggleMenu() {
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function closeMenu() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
